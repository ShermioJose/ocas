version: '3.8'

services:
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/backend
    depends_on:
      - php-fpm
      - node
    networks:
      - ocas-network

  php-fpm:
    build:
      context: ./backend
      dockerfile: ../.docker/php/Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./backend:/var/www/backend
    environment:
      - DB_HOST=ocas-mysql-1
      - DB_DATABASE=ocas
      - DB_USERNAME=ocas_user
      - DB_PASSWORD=ocas_password
    depends_on:
      - mysql
    networks:
      - ocas-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ocas
      MYSQL_USER: ocas_user
      MYSQL_PASSWORD: ocas_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ocas-network

  node:
    build:
      context: ./socket-server
      dockerfile: ../.docker/node/Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3000:3000"
    volumes:
      - ./socket-server:/app
      - /app/node_modules
    networks:
      - ocas-network

networks:
  ocas-network:
    driver: bridge

volumes:
  dbdata:
